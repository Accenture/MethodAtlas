name: Release

on:
  push:
    tags:
      - 'release@*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Quality gate: all tests must pass, JaCoCo instruction coverage must be
      # ≥ 70 %, and PMD must report no violations before a release is published.
      - name: Quality gate
        run: ./gradlew check --no-daemon

      - name: Build distribution archives
        run: ./gradlew distZip distTar --no-daemon

      - name: Generate release notes
        id: notes
        run: |
          current_tag="${{ github.ref_name }}"

          # strip the prefix for sorting, keep prefix for matching
          prefix="release@"

          # get all matching tags, strip prefix, sort them
          all_versions=$(git tag --list "${prefix}*" | sed "s/^${prefix}//" | sort -V)

          # find previous version
          previous_tag=""
          for v in $all_versions; do
            if [[ "$prefix$v" == "$current_tag" ]]; then
              break
            fi
            previous_tag="$prefix$v"
          done

          if [[ -z "$previous_tag" ]]; then
            range=""
          else
            range="$previous_tag..$current_tag"
          fi

          echo "Comparing range: $range"

          body="## What's New"

          for category in "feat: Features" "fix: Bug Fixes" "docs: Documentation" "chore: Chores"; do
            prefix="${category%%:*}"
            title="${category##*: }"
            entries=$(git log $range --pretty=format:"%B" --no-merges | ( grep "^${prefix}" || true ) | sed "s/^${prefix}:/- /")
            if [[ -n "$entries" ]]; then
              body="$body\n\n### $title\n$entries"
            fi
          done

          echo -e "$body" > /tmp/release_notes.md

      - name: Create Gitea Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/distributions/*.tar
            build/distributions/*.zip
          body_path: /tmp/release_notes.md
