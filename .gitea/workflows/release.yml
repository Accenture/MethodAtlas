name: Release

on:
  push:
    tags:
      - 'release@*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -----------------------------------------------------------------------
      # Quality gate – explicit named steps so each check is visible in the log.
      # -----------------------------------------------------------------------
      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Verify JaCoCo instruction coverage ≥ 70 %
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: PMD static analysis
        run: ./gradlew pmdMain --no-daemon

      - name: SpotBugs analysis
        run: ./gradlew spotbugsMain --no-daemon

      # -----------------------------------------------------------------------
      # Build artefacts
      # -----------------------------------------------------------------------
      - name: Build distribution archives
        run: ./gradlew distZip distTar --no-daemon

      - name: Generate CycloneDX SBOM
        run: ./gradlew cyclonedxBom --no-daemon

      # -----------------------------------------------------------------------
      # Changelog via git-cliff (reads cliff.toml at repo root)
      # -----------------------------------------------------------------------
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: |
          git-cliff --tag "${{ github.ref_name }}" \
                    --output /tmp/CHANGELOG_RELEASE.md

      # -----------------------------------------------------------------------
      # Publish release
      # -----------------------------------------------------------------------
      - name: Create Gitea Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/CHANGELOG_RELEASE.md
          files: |
            build/distributions/*.tar
            build/distributions/*.zip
            build/reports/bom.json
