# Runs PIT mutation testing every Sunday at 04:00 UTC and on manual dispatch.
# Mutation testing is intentionally separate from the CI quality gate because
# it takes significantly longer than normal test execution (each mutant
# requires a separate test run).
#
# Results are uploaded as a workflow artifact for review.
name: Mutation testing

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 04:00 UTC
  workflow_dispatch:

jobs:
  pitest:
    name: PIT mutation testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run PIT mutation testing
        run: ./gradlew pitest --no-daemon

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report
          path: build/reports/pitest/
          retention-days: 30
