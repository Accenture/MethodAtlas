# Runs on every branch push and on every pull-request.
# Each quality gate is an explicit named step so the CI log immediately shows
# which check failed without inspecting build.gradle.
#
# Gates enforced by ./gradlew check (build.gradle):
#   test                        – all JUnit 5 tests must pass
#   jacocoTestCoverageVerification – instruction coverage ≥ 70 %
#   pmdMain                     – zero PMD violations on main sources
#   spotbugsMain                – zero SpotBugs violations (excluding
#                                 config/spotbugs/excludeFilter.xml)
#   ArchitectureTest            – ArchUnit structural rules (runs as a test)
name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history + tags required by com.palantir.git-version

      - name: Validate commit messages (Conventional Commits)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          pattern='^(feat|fix|docs|style|refactor|test|chore|ci|perf|build|revert)(\([^)]+\))?(!)?: .+'
          fails=0
          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            if ! [[ "$msg" =~ $pattern ]]; then
              echo "::error::Non-conformant commit message: $msg"
              fails=$((fails + 1))
            fi
          done < <(git log --format="%s" "origin/${{ github.base_ref }}..HEAD")
          exit $fails

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # -----------------------------------------------------------------------
      # Step 1 – compile and run all JUnit 5 tests.
      # jacocoTestReport runs automatically as a test finalizer and produces
      # build/reports/jacoco/test/jacocoTestReport.xml (consumed by Codecov).
      # -----------------------------------------------------------------------
      - name: Run tests
        run: ./gradlew test --no-daemon

      # -----------------------------------------------------------------------
      # Step 2 – enforce JaCoCo instruction coverage ≥ 70 %.
      # This is a separate, explicitly named step so the threshold is visible
      # in the CI log.  The task reads build/jacoco/test.exec written in step 1.
      # -----------------------------------------------------------------------
      - name: Verify JaCoCo instruction coverage ≥ 70 %
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      # -----------------------------------------------------------------------
      # Step 3 – PMD static analysis on main sources.
      # -----------------------------------------------------------------------
      - name: PMD static analysis
        run: ./gradlew pmdMain --no-daemon

      # -----------------------------------------------------------------------
      # Step 4 – SpotBugs bug-pattern detection on main sources.
      # -----------------------------------------------------------------------
      - name: SpotBugs analysis
        run: ./gradlew spotbugsMain --no-daemon

      # -----------------------------------------------------------------------
      # Upload reports so failing runs can be diagnosed without a local checkout.
      # if: always() ensures upload even when a gate step fails.
      # -----------------------------------------------------------------------
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 14

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 14

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: build/reports/pmd/
          retention-days: 14

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          retention-days: 14

      # -----------------------------------------------------------------------
      # Upload coverage to Codecov for trend tracking and PR delta comments.
      # CODECOV_TOKEN secret is optional for public repositories.
      # -----------------------------------------------------------------------
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
