# MethodAtlas credential-detection rule catalog.
#
# Patterns encode vendor-published credential formats, transcribed independently.
# 'provenance' records the public source. The Aho-Corasick engine prefilters on
# 'anchors' (fixed substrings that appear in the token) and then confirms with
# 'pattern' on a window around each anchor hit.
#
# Convention: a rule has AT MOST ONE capturing group, which is the secret value.
# A rule with no capturing group treats the whole match as the value, so use
# NON-CAPTURING groups (?:...) for alternations you do not want extracted.
#
# Supply your own catalog with -secrets-rules <file> to replace this one entirely.
rules:
  # --- Cloud providers ----------------------------------------------------
  - id: aws-access-key-id
    category: PROVIDER_TOKEN
    anchors: ['AKIA', 'ASIA', 'AGPA', 'AIDA', 'AROA', 'ANPA', 'ANVA']
    pattern: '(?:AKIA|ASIA|AGPA|AIDA|AROA|ANPA|ANVA)[0-9A-Z]{16}'
    description: 'AWS access key id'
    provenance: 'AWS-published key-id prefixes; transcribed independently'
  - id: aws-mws-auth-token
    category: PROVIDER_TOKEN
    anchors: ['amzn.mws.']
    pattern: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
    description: 'Amazon MWS auth token'
    provenance: 'Amazon MWS format; transcribed independently'
  - id: gcp-api-key
    category: PROVIDER_TOKEN
    anchors: ['AIza']
    pattern: 'AIza[0-9A-Za-z_\-]{35}'
    description: 'Google Cloud / Firebase API key'
    provenance: 'Google-published format; transcribed independently'
  - id: gcp-oauth-token
    category: PROVIDER_TOKEN
    anchors: ['ya29.']
    pattern: 'ya29\.[0-9A-Za-z_\-]{20,}'
    description: 'Google OAuth access token'
    provenance: 'Google OAuth format; transcribed independently'
  - id: gcp-service-account
    category: PRIVATE_KEY
    anchors: ['"type": "service_account"', '"type":"service_account"']
    pattern: '"type":\s*"service_account"'
    description: 'Google service-account JSON key marker'
    provenance: 'Google service-account JSON shape; original'
  - id: azure-storage-key
    category: CONNECTION_STRING
    anchors: ['AccountKey=']
    pattern: 'AccountKey=[A-Za-z0-9+/=]{50,}'
    description: 'Azure storage account key in a connection string'
    provenance: 'Azure connection-string format; transcribed independently'
  - id: digitalocean-token
    category: PROVIDER_TOKEN
    anchors: ['dop_v1_', 'doo_v1_', 'dor_v1_']
    pattern: 'do[opr]_v1_[0-9a-f]{64}'
    description: 'DigitalOcean personal/OAuth/refresh token'
    provenance: 'DigitalOcean prefix scheme; transcribed independently'
  - id: heroku-api-key
    category: PROVIDER_TOKEN
    anchors: ['HRKU-']
    pattern: 'HRKU-[0-9A-Za-z_\-]{30,}'
    description: 'Heroku API key'
    provenance: 'Heroku prefix scheme; transcribed independently'

  # --- Source hosting & CI ------------------------------------------------
  - id: github-token
    category: PROVIDER_TOKEN
    anchors: ['ghp_', 'gho_', 'ghu_', 'ghs_', 'ghr_']
    pattern: 'gh[opusr]_[A-Za-z0-9]{36}'
    description: 'GitHub personal/OAuth/user/server/refresh token'
    provenance: 'GitHub-published token prefix scheme; transcribed independently'
  - id: github-fine-grained-pat
    category: PROVIDER_TOKEN
    anchors: ['github_pat_']
    pattern: 'github_pat_[0-9A-Za-z_]{82}'
    description: 'GitHub fine-grained personal access token'
    provenance: 'GitHub fine-grained PAT format; transcribed independently'
  - id: gitlab-pat
    category: PROVIDER_TOKEN
    anchors: ['glpat-']
    pattern: 'glpat-[0-9A-Za-z_\-]{20}'
    description: 'GitLab personal access token'
    provenance: 'GitLab prefix scheme; transcribed independently'
  - id: gitlab-pipeline-token
    category: PROVIDER_TOKEN
    anchors: ['glptt-', 'GR1348941']
    pattern: '(?:glptt-[0-9a-f]{40}|GR1348941[0-9A-Za-z_\-]{20})'
    description: 'GitLab pipeline trigger / runner registration token'
    provenance: 'GitLab prefix schemes; transcribed independently'

  # --- Payments -----------------------------------------------------------
  - id: stripe-secret-key
    category: PROVIDER_TOKEN
    anchors: ['sk_live_', 'rk_live_', 'sk_test_', 'rk_test_']
    pattern: '(?:sk|rk)_(?:live|test)_[0-9A-Za-z]{24,}'
    description: 'Stripe secret / restricted key'
    provenance: 'Stripe prefix scheme; transcribed independently'
  - id: square-access-token
    category: PROVIDER_TOKEN
    anchors: ['sq0atp-', 'sq0csp-', 'EAAA']
    pattern: '(?:sq0[ac][ts]p-[0-9A-Za-z_\-]{22,43}|EAAA[0-9A-Za-z_\-]{60})'
    description: 'Square access / OAuth token'
    provenance: 'Square prefix scheme; transcribed independently'
  - id: paypal-braintree-token
    category: PROVIDER_TOKEN
    anchors: ['access_token$production$', 'access_token$sandbox$']
    pattern: 'access_token\$(?:production|sandbox)\$[0-9a-z]{16}\$[0-9a-f]{32}'
    description: 'Braintree/PayPal access token'
    provenance: 'Braintree token format; transcribed independently'

  # --- Messaging & email --------------------------------------------------
  - id: slack-token
    category: PROVIDER_TOKEN
    anchors: ['xoxb-', 'xoxp-', 'xoxa-', 'xoxr-', 'xoxs-', 'xapp-']
