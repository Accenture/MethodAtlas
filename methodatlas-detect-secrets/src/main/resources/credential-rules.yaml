  # --- Crypto / blockchain ------------------------------------------------
  - id: ethereum-private-key
    category: PRIVATE_KEY
    anchors: ['private_key', 'privatekey', 'eth_key']
    pattern: '(?i)(?:eth_?|private_?)key\s*[:=]\s*["''](0x[0-9a-fA-F]{64})["'']'
    description: 'Ethereum / EVM private key (keyword-anchored 0x + 64 hex)'
    provenance: 'EVM private-key form; original idiom'
  - id: infura-project-secret
    category: PASSWORD_ASSIGNMENT
    anchors: ['infura']
    pattern: '(?i)infura[_\-]?(?:project[_\-]?)?secret\s*[:=]\s*["'']([0-9a-f]{32})["'']'
    description: 'Infura project secret (keyword-anchored)'
    provenance: 'Infura credential field shape; original idiom'
  - id: alchemy-api-key
