    anchors: ['EAA']
    pattern: 'EAA[0-9A-Za-z]{90,}'
    description: 'Facebook / Meta Graph API access token'
    provenance: 'Facebook token shape; transcribed independently'
  - id: facebook-app-secret
    category: PASSWORD_ASSIGNMENT
    anchors: ['facebook', 'fb_app']
    pattern: '(?i)(?:facebook|fb)[_\-]?app[_\-]?secret\s*[:=]\s*["'']([0-9a-f]{32})["'']'
    description: 'Facebook app secret (keyword-anchored)'
    provenance: 'Facebook credential field shape; original idiom'
  - id: twitter-bearer-token
    category: PROVIDER_TOKEN
    anchors: ['AAAAAAAAAAAAAAAAAAAAA']
    pattern: 'AAAAAAAAAAAAAAAAAAAAA[0-9A-Za-z%]{30,}'
    description: 'Twitter / X API v2 bearer token'
    provenance: 'Twitter bearer-token shape; transcribed independently'
  - id: twitter-api-secret
    category: PASSWORD_ASSIGNMENT
    anchors: ['twitter']
    pattern: '(?i)twitter[_\-]?(?:api[_\-]?|consumer[_\-]?)?secret\s*[:=]\s*["'']([0-9A-Za-z]{45,50})["'']'
    description: 'Twitter / X API secret (keyword-anchored)'
    provenance: 'Twitter credential field shape; original idiom'
  - id: linkedin-secret
    category: PASSWORD_ASSIGNMENT
