  # =======================================================================
  # Extended coverage. Every rule below encodes a vendor-published credential
  # format transcribed independently from the vendor's own documentation, or a
  # keyword-anchored assignment idiom. Prefix rules carry NO capturing group
  # (the whole match is the value); keyword rules carry exactly ONE group (the
  # quoted value). Keyword anchors are matched case-insensitively.
  # =======================================================================

  # --- Cloud providers (extended) ----------------------------------------
  - id: aws-secret-access-key
    category: PASSWORD_ASSIGNMENT
    anchors: ['aws_secret_access_key', 'awssecretkey']
    pattern: '(?i)aws_?secret_?(?:access_?)?key\s*[:=]\s*["'']([A-Za-z0-9/+]{40})["'']'
    description: 'AWS secret access key (keyword-anchored 40-char base64)'
    provenance: 'AWS credential field shape; original idiom'
  - id: aws-session-token
    category: PASSWORD_ASSIGNMENT
    anchors: ['aws_session_token']
    pattern: '(?i)aws_session_token\s*[:=]\s*["'']([A-Za-z0-9/+=]{100,})["'']'
    description: 'AWS temporary session token'
    provenance: 'AWS STS field shape; original idiom'
  - id: gcp-oauth-client-id
    category: PROVIDER_TOKEN
    anchors: ['.apps.googleusercontent.com']
    pattern: '[0-9]+-[0-9a-z]{32}\.apps\.googleusercontent\.com'
    description: 'Google OAuth client id'
    provenance: 'Google OAuth client-id shape; transcribed independently'
  - id: tencent-cloud-secret-id
    category: PROVIDER_TOKEN
    anchors: ['AKID']
    pattern: 'AKID[0-9A-Za-z]{32,40}'
    description: 'Tencent Cloud secret id'
    provenance: 'Tencent Cloud prefix scheme; transcribed independently'
  - id: scaleway-secret-key
