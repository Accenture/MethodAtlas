    anchors: ['sinch']
    pattern: '(?i)sinch[_\-]?(?:api[_\-]?)?(?:key|secret)\s*[:=]\s*["'']([0-9A-Za-z]{16,})["'']'
    description: 'Sinch API key / secret (keyword-anchored)'
    provenance: 'Sinch credential field shape; original idiom'

  # --- Dev tools / infra (extended) ---------------------------------------
  - id: ngrok-authtoken
    category: PASSWORD_ASSIGNMENT
    anchors: ['ngrok']
    pattern: '(?i)ngrok[_\-]?(?:auth)?token\s*[:=]\s*["'']([0-9A-Za-z_]{40,})["'']'
    description: 'ngrok authtoken (keyword-anchored)'
    provenance: 'ngrok credential field shape; original idiom'
  - id: tailscale-key
    category: PROVIDER_TOKEN
    anchors: ['tskey-auth-', 'tskey-api-', 'tskey-client-']
    pattern: 'tskey-(?:auth|api|client)-[0-9A-Za-z]{8,}-[0-9A-Za-z]{20,}'
    description: 'Tailscale auth / API / OAuth client key'
    provenance: 'Tailscale prefix scheme; transcribed independently'
  - id: onepassword-service-account
    category: PROVIDER_TOKEN
    anchors: ['ops_']
    pattern: 'ops_[0-9A-Za-z=_\-]{20,}'
    description: '1Password service-account token'
    provenance: '1Password prefix scheme; transcribed independently'
  - id: age-secret-key
    category: PRIVATE_KEY
    anchors: ['AGE-SECRET-KEY-1']
    pattern: 'AGE-SECRET-KEY-1[0-9A-Z]{50,}'
    description: 'age encryption secret key'
    provenance: 'age key format; transcribed independently'
  - id: ansible-vault
    category: PRIVATE_KEY
    anchors: ['$ANSIBLE_VAULT']
