  # --- Private keys -------------------------------------------------------
  - id: pem-private-key
    category: PRIVATE_KEY
    anchors: ['-----BEGIN']
    pattern: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP |ENCRYPTED )?PRIVATE KEY-----'
    description: 'PEM private key block header'
    provenance: 'RFC 7468 label set; transcribed independently'
  - id: ssh-private-key-putty
    category: PRIVATE_KEY
    anchors: ['PuTTY-User-Key-File-']
    pattern: 'PuTTY-User-Key-File-[0-9]'
    description: 'PuTTY private key file header'
    provenance: 'PuTTY .ppk format; original'

  # --- Connection strings -------------------------------------------------
  - id: url-with-credentials
    category: CONNECTION_STRING
    anchors: ['://']
    pattern: '[a-zA-Z][a-zA-Z0-9+.\-]*://[^/\s:@"'']+:([^/\s:@"'']{3,})@[^/\s"'']+'
    description: 'URL with embedded username:password (incl. JDBC, AMQP, Mongo, Redis)'
    provenance: 'RFC 3986 userinfo form; original'

  # --- Generic credentials (anchored on keywords) ------------------------
  - id: generic-password-assignment
    category: PASSWORD_ASSIGNMENT
    anchors: ['password', 'passwd', 'pwd', 'secret', 'token', 'apikey', 'api_key', 'api-key', 'credential', 'auth', 'access_key', 'private_key', 'client_secret']
    pattern: '(?i)(?:password|passwd|pwd|secret|token|api[_-]?key|credential|auth[_-]?token|access[_-]?key|client[_-]?secret)\s*[:=(]\s*["'']([^"'']{6,})["'']'
    description: 'Credential supplied via keyword assignment or setter call'
    provenance: 'Common assignment and setter idiom; original'
  - id: basic-auth-header
    category: PASSWORD_ASSIGNMENT
    anchors: ['Basic ', 'Authorization']
    pattern: '(?i)authorization["'':\s]+basic\s+([A-Za-z0-9+/=]{16,})'
    description: 'HTTP Basic auth header with base64 credentials'
    provenance: 'RFC 7617 Basic scheme; original'
  - id: bearer-token
    category: PASSWORD_ASSIGNMENT
    anchors: ['Bearer ']
    pattern: '(?i)bearer\s+([A-Za-z0-9_\-\.=]{20,})'
    description: 'HTTP Bearer authorization token'
    provenance: 'RFC 6750 Bearer scheme; original'

  # --- Unanchored, entropy-gated -----------------------------------------
  - id: high-entropy-string
    category: HIGH_ENTROPY
    anchors: []
    pattern: '["'']([A-Za-z0-9+/=_\-]{24,})["'']'
    entropyMin: 4.2
    description: 'High-entropy quoted literal'
    provenance: 'Shannon-entropy heuristic; original'
  - id: hex-secret
    category: HIGH_ENTROPY
    anchors: []
    pattern: '["'']([0-9a-fA-F]{32,})["'']'
    entropyMin: 3.0
    description: 'Long hexadecimal literal (key/hash/secret)'
    provenance: 'Hex-secret heuristic; original'
