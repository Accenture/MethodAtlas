    description: 'Reddit client secret (keyword-anchored)'
    provenance: 'Reddit credential field shape; original idiom'

  # --- E-commerce ---------------------------------------------------------
  - id: woocommerce-consumer-key
    category: PROVIDER_TOKEN
    anchors: ['ck_']
    pattern: 'ck_[0-9a-f]{40}'
    description: 'WooCommerce consumer key'
    provenance: 'WooCommerce prefix scheme; transcribed independently'
  - id: woocommerce-consumer-secret
    category: PROVIDER_TOKEN
    anchors: ['cs_']
    pattern: 'cs_[0-9a-f]{40}'
    description: 'WooCommerce consumer secret'
    provenance: 'WooCommerce prefix scheme; transcribed independently'
  - id: bigcommerce-token
    category: PASSWORD_ASSIGNMENT
    anchors: ['bigcommerce']
    pattern: '(?i)bigcommerce[_\-]?(?:access[_\-]?)?token\s*[:=]\s*["'']([0-9a-z]{30,})["'']'
    description: 'BigCommerce access token (keyword-anchored)'
    provenance: 'BigCommerce credential field shape; original idiom'

  # --- Telephony / SMS ----------------------------------------------------
  - id: telnyx-api-key
