  - id: postmark-token
    category: PROVIDER_TOKEN
    anchors: ['X-Postmark-Server-Token']
    pattern: 'X-Postmark-Server-Token["'':\s]+[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
