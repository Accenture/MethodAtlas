# Runs OWASP Dependency-Check and SpotBugs SARIF upload every Monday at
# 03:00 UTC and on manual dispatch.
#
# SpotBugs results are uploaded to GitHub Code Scanning so findings appear
# in the Security tab and as PR diff annotations.
#
# MethodAtlas self-analysis note
# --------------------------------
# MethodAtlas without -ai produces a plain test-method inventory (name, LOC,
# existing @Tag values, file location).  Every method becomes an undifferentiated
# SARIF "result" with no security verdict — uploading that to Code Scanning
# would drown out real SpotBugs findings with hundreds of noise annotations.
#
# Self-analysis is only meaningful when an AI provider is configured via
# secrets (e.g. ANTHROPIC_API_KEY / OPENAI_API_KEY), in which case the tool
# classifies each test method for security relevance and the SARIF contains
# genuine findings worth reviewing in the Security tab.
#
# To enable AI-powered self-analysis uncomment the two steps at the bottom
# and add the appropriate provider secret to the repository settings.
name: Security scan

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to Code Scanning

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: nvd-db-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.*
          retention-days: 30

  code-scanning:
    name: Code scanning (SpotBugs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # SpotBugs is configured to emit SARIF alongside HTML (build.gradle).
      - name: Run SpotBugs (produces SARIF)
        run: ./gradlew spotbugsMain

      - name: Upload SpotBugs SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/spotbugs/main.sarif
          category: spotbugs

      # -----------------------------------------------------------------------
      # MethodAtlas AI self-analysis (dogfooding) — DISABLED until an AI
      # provider secret is configured.
      #
      # When enabled, the tool classifies each of its own JUnit test methods
      # for security relevance.  The resulting SARIF surfaces security-related
      # test methods directly in the GitHub Security tab, providing a live
      # demonstration of the tool's output on a known codebase.
      #
      # To activate:
      #   1. Add ANTHROPIC_API_KEY (or OPENAI_API_KEY / OLLAMA_BASE_URL) to
      #      repository secrets.
      #   2. Uncomment the two steps below and set the correct -ai-provider
      #      and -ai-api-key-env flags for your provider.
      # -----------------------------------------------------------------------
      # - name: Build and install MethodAtlas
      #   run: ./gradlew installDist
      #
      # - name: Run MethodAtlas AI self-analysis
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: |
      #     build/install/methodatlas/bin/methodatlas \
      #       -sarif \
      #       -ai \
      #       -ai-provider anthropic \
      #       src/test/java \
      #       > build/reports/methodatlas-self.sarif.json
      #
      # - name: Upload MethodAtlas self-analysis SARIF to Code Scanning
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: build/reports/methodatlas-self.sarif.json
      #     category: methodatlas
