# Runs OWASP Dependency-Check and SpotBugs SARIF upload every Monday at
# 03:00 UTC and on manual dispatch.
#
# SpotBugs results are uploaded to GitHub Code Scanning so findings appear
# in the Security tab and as PR diff annotations.
#
# MethodAtlas AI self-analysis (dogfooding)
# ----------------------------------------
# When the OPENROUTER_API_KEY repository secret is present, MethodAtlas
# classifies each of its own JUnit test methods for security relevance using
# the OpenRouter AI gateway.  The resulting SARIF is uploaded to Code Scanning
# so security-related test methods surface directly in the Security tab —
# a live demonstration of the tool's output on a known codebase.
#
# Model selection (in priority order):
#   1. vars.METHODATLAS_AI_MODEL  (repository variable, non-secret)
#   2. stepfun/step-3.5-flash:free  (built-in default)
#
# To activate: add OPENROUTER_API_KEY to repository secrets.
# To override the model: set METHODATLAS_AI_MODEL in repository variables.
name: Security scan

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to Code Scanning

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: nvd-db-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.*
          retention-days: 30

  code-scanning:
    name: Code scanning (SpotBugs + MethodAtlas)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # SpotBugs is configured to emit SARIF alongside HTML (build.gradle).
      - name: Run SpotBugs (produces SARIF)
        run: ./gradlew spotbugsMain

      - name: Upload SpotBugs SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/spotbugs/main.sarif
          category: spotbugs

      # -----------------------------------------------------------------------
      # MethodAtlas AI self-analysis — runs only when OPENROUTER_API_KEY is set.
      # Both steps are skipped entirely when the secret is absent.
      # -----------------------------------------------------------------------
      - name: Build and install MethodAtlas
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        run: ./gradlew installDist

      - name: Run MethodAtlas AI self-analysis
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          build/install/methodatlas/bin/methodatlas \
            -sarif \
            -ai \
            -ai-provider openrouter \
            -ai-model "${{ vars.METHODATLAS_AI_MODEL || 'stepfun/step-3.5-flash:free' }}" \
            -ai-api-key-env OPENROUTER_API_KEY \
            -ai-confidence \
            src/test/java \
            > build/reports/methodatlas-self.sarif.json

      - name: Upload MethodAtlas self-analysis SARIF to Code Scanning
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/methodatlas-self.sarif.json
          category: methodatlas
