site_name: MethodAtlas
site_description: >-
  Scan Java test sources (JUnit 5, JUnit 4, TestNG), build a structured
  security test inventory, and enrich results with AI-generated classification.
  Built for regulated environments.
site_url: https://accenture.github.io/MethodAtlas/
repo_url: https://github.com/Accenture/MethodAtlas
repo_name: Accenture/MethodAtlas
edit_uri: ""

copyright: >-
  Copyright &copy; 2026 Egothor and Accenture &mdash;
  Licensed under the
  <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache License, Version&nbsp;2.0</a>

theme:
  name: material
  custom_dir: docs/overrides
  icon:
    logo: material/map-search
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Accenture/MethodAtlas
      name: MethodAtlas on GitHub

